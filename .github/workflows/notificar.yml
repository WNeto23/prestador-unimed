name: Notificar Prestadores

on:
  schedule:
    - cron: '0 11 * * 1-7'  # 08:00 BRT (segunda a domingo)
  workflow_dispatch:  # Permite execução manual

jobs:
  notificar:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v4  # Atualizado para v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5  # Atualizado para v5
        with:
          python-version: '3.13'
          cache: 'pip'  # Adiciona cache para acelerar
      
      - name: 📦 Instalar dependências
        run: |
          pip install --upgrade pip
          pip install flet==0.28.3 python-dotenv schedule
      
      - name: 📧 Executar notificador
        env:
          EMAIL_LOGIN: ${{ secrets.EMAIL_LOGIN }}
          EMAIL_LOGIN_PASS: ${{ secrets.EMAIL_LOGIN_PASS }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        run: python notificador.py
      
      - name: 📝 Upload do log (com data)
        if: always()
        uses: actions/upload-artifact@v4  # Atualizado para v4
        with:
          name: notificacoes-log-${{ github.run_id }}  # Nome único
          path: notificacoes.log
          retention-days: 30  # Mantém por 30 dias