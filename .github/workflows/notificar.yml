name: 🤖 Notificar Prestadores - Unimed RV (NeonDB)

on:
  schedule:
    - cron: '0 12 * * *'  # 09:00 BRT (12:00 UTC) - TODOS OS DIAS
  workflow_dispatch:  # Permite execução manual

jobs:
  notificar:
    name: 📧 Enviar Notificações
    runs-on: ubuntu-latest
    environment: producao
    
    # Timeout para evitar execuções infinitas
    timeout-minutes: 10
    
    steps:
      # 1. Verificar segredos ANTES de começar
      - name: 🔍 Verificar Segredos Obrigatórios
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          EMAIL_LOGIN: ${{ secrets.EMAIL_LOGIN }}
          EMAIL_LOGIN_PASS: ${{ secrets.EMAIL_LOGIN_PASS }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        run: |
          echo "🔐 Verificando credenciais..."
          echo "✅ Data/Hora: $(date -u)"
          echo "🕐 UTC: $(date -u +%H:%M)"
          echo "🕐 BRT: $(TZ=America/Sao_Paulo date +%H:%M)"
          
          if [ -z "$NEON_DATABASE_URL" ]; then
            echo "❌ ERRO: Secret NEON_DATABASE_URL não configurado!"
            exit 1
          fi
          
          if [ -z "$EMAIL_LOGIN" ]; then
            echo "❌ ERRO: Secret EMAIL_LOGIN não configurado!"
            exit 1
          fi
          
          if [ -z "$EMAIL_LOGIN_PASS" ]; then
            echo "❌ ERRO: Secret EMAIL_LOGIN_PASS não configurado!"
            exit 1
          fi
          
          if [ -z "$EMAIL_REMETENTE" ]; then
            echo "❌ ERRO: Secret EMAIL_REMETENTE não configurado!"
            exit 1
          fi
          
          echo "✅ Todos os segredos estão configurados!"
      
      # 2. Baixar código
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Apenas o último commit (mais rápido)
      
      # 3. Configurar Python com cache
      - name: 🐍 Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      # 4. Instalar dependências
      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary==2.9.9 \
                      python-dotenv==1.0.0 \
                      holidays==0.58 \
                      jinja2==3.1.4
          
          echo "📋 Dependências instaladas:"
          pip list
      
      # 5. Executar notificador com NeonDB
      - name: 📧 Executar Notificador (NeonDB)
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          EMAIL_LOGIN: ${{ secrets.EMAIL_LOGIN }}
          EMAIL_LOGIN_PASS: ${{ secrets.EMAIL_LOGIN_PASS }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          URL_PORTAL: ${{ secrets.URL_PORTAL || 'https://portal.unimedrv.com.br' }}
          EMAIL_CONTATO: ${{ secrets.EMAIL_CONTATO || 'prestador@unimedrv.com.br' }}
          TZ: America/Sao_Paulo  # Força fuso horário
        run: |
          echo "🚀 Iniciando notificador em $(date)"
          echo "📧 Remetente: $EMAIL_REMETENTE"
          echo "🗄️ Banco: NeonDB (PostgreSQL)"
          
          # Executa e captura saída
          python notificador.py 2>&1 | tee notificador_output.log
          
          # Verifica se executou com sucesso
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Notificador executado com sucesso!"
          else
            echo "❌ Notificador falhou!"
            exit 1
          fi
      
      # 6. Upload de logs (SEMPRE, mesmo se falhar)
      - name: 📤 Upload de Logs para Auditoria
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-notificacoes-${{ github.run_id }}
          path: |
            *.log
            notificador_output.log
          retention-days: 90  # Mantém por 90 dias
          if-no-files-found: warn
      
      # 7. Notificar em caso de falha (opcional)
      - name: 🔔 Criar Issue em Caso de Falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Falha na Notificação - ${new Date().toLocaleDateString('pt-BR')}`;
            const body = `
            ## ❌ Falha na Notificação Automática
            
            **Data/Hora:** ${new Date().toLocaleString('pt-BR')}
            **Workflow:** ${context.workflow}
            **Run ID:** ${context.runId}
            
            ### 📋 Logs
            [Clique aqui para ver os logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            ### ⚡ Ação Necessária
            Verifique os logs e corrija o problema manualmente.
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'automation-failed']
            });