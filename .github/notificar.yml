name: Notificar Prestadores

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 08:00 BRT (segunda a sexta)
  workflow_dispatch:  # Permite execução manual

jobs:
  notificar:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Baixar código
        uses: actions/checkout@v3
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: 📦 Instalar dependências
        run: |
          pip install flet==0.28.3 python-dotenv schedule
      
      - name: 📧 Executar notificador
        env:
          EMAIL_LOGIN: ${{ secrets.EMAIL_LOGIN }}
          EMAIL_LOGIN_PASS: ${{ secrets.EMAIL_LOGIN_PASS }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
        run: python notificador.py
      
      - name: 📝 Upload do log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: notificacoes-log
          path: notificacoes.log